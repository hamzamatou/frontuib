<header class="header-wrap">
  <div class="header-row">
    <div class="brand">
      <div class="brand-logo"></div>
      <div>
        <div class="brand-title">UIB BNPL</div>
        <div class="brand-sub"></div>
      </div>
    </div>
    <div class="profile-links">
      <span>
        Profil ({{ roleLabel || 'Utilisateur' }} · {{ userName || '—' }})
      </span>
      <a routerLink="/login">Deconnexion</a>
    </div>
  </div>
  <nav class="top-nav">
    @if (roleLabel === 'Commerçant') {
      <a routerLink="/mes-demandes" routerLinkActive="active" class="top-nav-item">Mes demandes</a>
      <a routerLink="/commercant" routerLinkActive="active" class="top-nav-item">Creer une demande</a>
    } @else if (roleLabel === 'Admin') {
      <a routerLink="/admin" routerLinkActive="active" class="top-nav-item">Utilisateurs</a>
    } @else if (roleLabel === 's') {
      <a routerLink="/banque/demandes" routerLinkActive="active" class="top-nav-item">Demandes banque</a>
      <a routerLink="/banque/affectees" routerLinkActive="active" class="top-nav-item">Prise en charge</a>
    }
  </nav>
</header>
