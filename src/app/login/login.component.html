<div class="login-container">
  <div class="brand-section">
    <div class="brand-content">
      <div class="logo-area">
        <h1 class="logo-main">UIB</h1>
        <p class="logo-sub">UNION INTERNATIONALE DE BANQUES</p>
      </div>
      
      <div class="description-area">
        <h2 class="platform-title">Plateforme de financement BNPL</h2>
        <p class="platform-subtitle">Gérez vos demandes de financement en toute sécurité.</p>
      </div>

      <div class="login-stats">
        <div class="login-stat">
          <div class="login-stat-val">+2 400</div>
          <div class="login-stat-lbl">Demandes traitées</div>
        </div>
        <div class="login-stat">
          <div class="login-stat-val">98%</div>
          <div class="login-stat-lbl">Taux de satisfaction</div>
        </div>
        <div class="login-stat">
          <div class="login-stat-val">48h</div>
          <div class="login-stat-lbl">Décision moyenne</div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="login-card">
      <h3 class="form-title">Connexion</h3>
      
      <form (ngSubmit)="login()">
        <div class="input-group">
          <label for="identifiant">IDENTIFIANT</label>
          <input 
            id="identifiant" 
            type="text" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="email@gmail.com" 
          />
        </div>

        <div class="input-group">
          <label for="password">MOT DE PASSE</label>
          <input 
            id="password" 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••" 
          />
        </div>

        <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Chargement...' : 'Se connecter' }}
        </button>
      </form>
    </div>
  </div>
</div>
