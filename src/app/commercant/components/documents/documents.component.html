<div class="card" [class.completed]="status === 'completed'">
  <div class="card-head">
    <div class="head-left" style="display: flex; align-items: center; gap: 12px;">
      <div class="snum" [class.done]="status === 'completed'">
        {{ status === 'completed' ? '✔' : '3' }}
      </div>
      <div class="title-block">
        <h3>Pièces justificatives (US07)</h3>
        <div class="ssub">
          {{ status === 'completed' ? 'Complété' : (status === 'active' ? 'En cours' : 'En attente') }}
        </div>
      </div>
    </div>
    <div class="status-badge" *ngIf="status === 'completed'">
      <span>✔</span> Complété
    </div>
  </div>

  <div class="card-body">
    <div class="upload-container">
      <div class="upload-section">
        <label>CIN / PASSEPORT</label>
        <div class="drop-zone" 
             [class.disabled]="status === 'completed'"
             (click)="status !== 'completed' ? cinInput.click() : null">
          <div class="icon-doc">📄</div>
          <p>Glisser ou <span>parcourir</span></p>
          <input type="file" #cinInput (change)="onFile($event, 'cin')" hidden [disabled]="status === 'completed'">
        </div>
      </div>

      <div class="upload-section">
        <label>FICHE DE PAIE (3 MOIS)</label>
        <div class="drop-zone" 
             [class.disabled]="status === 'completed'"
             (click)="status !== 'completed' ? payInput.click() : null">
          <div class="icon-money">💰</div>
          <p>Glisser ou <span>parcourir</span></p>
          <input type="file" #payInput (change)="onFile($event, 'pay')" hidden [disabled]="status === 'completed'">
        </div>

        <div class="file-list" *ngIf="uploadedFiles.length > 0">
          <div class="file-item" *ngFor="let file of uploadedFiles">
            <span class="file-icon">📄</span>
            <span class="file-name">{{ file.file.name }} — {{ (file.file.size / 1024).toFixed(1) }} KB</span>
            <span class="check-box">✔</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actions" *ngIf="status === 'active'">
      <button class="btn btn-outline" (click)="prevStep.emit()">← Retour</button>
      <button class="btn btn-red" (click)="goNext()">Suivant →</button>
    </div>
  </div>
</div>
